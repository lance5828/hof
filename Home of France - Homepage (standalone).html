document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

solid #f0f0f0\">\n                <span><span style=\"font-size:14.5px;font-weight:500\">Parking<\u002Fspan><span style=\"font-size:12.5px;color:#9a9a9a;margin-left:8px\">{{parkingHint}}<\u002Fspan><\u002Fspan>\n                <input type=\"checkbox\" checked=\"{{parkingOn}}\" onchange=\"{{toggleParking}}\" style=\"width:19px;height:19px;accent-color:#5E1622;cursor:pointer\">\n              <\u002Flabel>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 15px\">\n                <span style=\"font-size:14.5px;font-weight:500\">Pool access<\u002Fspan>\n                <select value=\"{{poolMode}}\" onchange=\"{{onPool}}\" style=\"padding:8px 10px;border:1px solid #dcdcdc;border-radius:9px;font-size:13.5px;color:#1a1a1a;background:#fff;cursor:pointer\">\n                  <option value=\"none\">None<\u002Foption>\n                  <option value=\"regular\">Regular · ₱150/guest<\u002Foption>\n                  <option value=\"holiday\">Holiday · ₱300/guest<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:20px;background:#FAFAF8;border:1px solid #eee;border-radius:12px;padding:15px 17px\">\n            <sc-if value=\"{{priceValid}}\" hint-placeholder-val=\"{{true}}\">\n              <div style=\"display:flex;flex-direction:column;gap:9px;font-size:13.5px;color:#3a3a3a\">\n                <div style=\"display:flex;justify-content:space-between\"><span>{{roomRowLabel}}<\u002Fspan><span>{{roomLabel}}<\u002Fspan><\u002Fdiv>\n                <sc-if value=\"{{showDiscount}}\" hint-placeholder-val=\"{{false}}\"><div style=\"display:flex;justify-content:space-between;color:#5E1622\"><span>Multi-night discount<\u002Fspan><span>{{discountLabel}}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{showExtra}}\" hint-placeholder-val=\"{{false}}\"><div style=\"display:flex;justify-content:space-between\"><span>{{extraRowLabel}}<\u002Fspan><span>{{extraLabel}}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{showTowels}}\" hint-placeholder-val=\"{{false}}\"><div style=\"display:flex;justify-content:space-between\"><span>Towels<\u002Fspan><span>{{towelsLabel}}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{showPool}}\" hint-placeholder-val=\"{{false}}\"><div style=\"display:flex;justify-content:space-between\"><span>{{poolRowLabel}}<\u002Fspan><span>{{poolLabel}}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{showParking}}\" hint-placeholder-val=\"{{false}}\"><div style=\"display:flex;justify-content:space-between\"><span>{{parkingRowLabel}}<\u002Fspan><span>{{parkingLabel}}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{priceInvalid}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"font-size:13.5px;color:#9a9a9a\">Select your dates to see the total.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{errorMsg}}\" hint-placeholder-val=\"\">\n            <div style=\"margin-top:14px;font-size:13.5px;color:#b3261e\">{{errorMsg}}<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid #eee\">\n            <div><div style=\"font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#9a9a9a;margin-bottom:2px\">Total<\u002Fdiv><div style=\"font-size:24px;font-weight:600;letter-spacing:-.01em;color:#5E1622\">{{totalLabel}}<\u002Fdiv><\u002Fdiv>\n            <button onclick=\"{{next}}\" style=\"padding:13px 28px;background:#5E1622;color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:500;cursor:pointer\">Continue<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 2 : PAYMENT -->\n      <sc-if value=\"{{isStep2}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"padding:24px 32px 30px\">\n          <h3 style=\"margin:0 0 6px;font-size:26px;letter-spacing:-.02em;font-weight:600\">Payment<\u002Fh3>\n          <p style=\"margin:0 0 18px;font-size:14.5px;color:#6b6b6b;line-height:1.55\">Choose how you'd like to pay. Total due <span style=\"color:#5E1622;font-weight:600\">{{totalLabel}}<\u002Fspan>.<\u002Fp>\n\n          <div style=\"display:flex;gap:10px;margin-bottom:22px\">\n            <button onclick=\"{{setGcash}}\" style=\"{{gcashTabStyle}}\">GCash<\u002Fbutton>\n            <button onclick=\"{{setCardMethod}}\" style=\"{{cardTabStyle}}\">Credit / debit card<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- GCASH -->\n          <sc-if value=\"{{isGcash}}\" hint-placeholder-val=\"{{true}}\">\n            <div style=\"display:flex;gap:22px;align-items:center;background:#FAFAF8;border:1px solid #eee;border-radius:16px;padding:22px\">\n              <div style=\"width:104px;height:104px;border-radius:12px;background:#fff;border:1px solid #e2e2e2;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:3px;padding:10px;flex:none\">\n                <div style=\"background:#1a1a1a;grid-column:1/3;grid-row:1/3;border-radius:3px\"><\u002Fdiv><div><\u002Fdiv><div style=\"background:#1a1a1a;grid-column:4/6;grid-row:1/3;border-radius:3px\"><\u002Fdiv>\n                <div><\u002Fdiv><div style=\"background:#1a1a1a\"><\u002Fdiv><div style=\"background:#1a1a1a\"><\u002Fdiv><div><\u002Fdiv><div style=\"background:#1a1a1a\"><\u002Fdiv>\n                <div style=\"background:#1a1a1a;grid-column:1/3;grid-row:4/6;border-radius:3px\"><\u002Fdiv><div style=\"background:#1a1a1a\"><\u002Fdiv><div><\u002Fdiv><div style=\"background:#1a1a1a\"><\u002Fdiv><div><\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#9a9a9a;margin-bottom:4px\">GCash · Home of France<\u002Fdiv>\n                <div style=\"font-size:22px;font-weight:600;letter-spacing:-.01em\">0917 123 4567<\u002Fdiv>\n                <div style=\"margin-top:12px;font-size:13px;color:#6b6b6b\">Amount due<\u002Fdiv>\n                <div style=\"font-size:24px;font-weight:600;color:#5E1622\">{{totalLabel}}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:16px;font-size:13px;color:#9a9a9a;line-height:1.5\">Scan the QR in your GCash app or send to the number above, then upload your receipt on the next step.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- CARD -->\n          <sc-if value=\"{{isCard}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <div>\n                <label style=\"display:block;font-size:13px;color:#6b6b6b;margin-bottom:7px\">Card number<\u002Flabel>\n                <input type=\"text\" inputmode=\"numeric\" value=\"{{cardNo}}\" onchange=\"{{onCardNo}}\" placeholder=\"1234 5678 9012 3456\" style=\"width:100%;padding:12px 13px;border:1px solid #dcdcdc;border-radius:11px;font-size:15px;letter-spacing:.04em\">\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n                <div>\n                  <label style=\"display:block;font-size:13px;color:#6b6b6b;margin-bottom:7px\">Expiry<\u002Flabel>\n                  <input type=\"text\" value=\"{{cardExp}}\" onchange=\"{{onCardExp}}\" placeholder=\"MM/YY\" style=\"width:100%;padding:12px 13px;border:1px solid #dcdcdc;border-radius:11px;font-size:15px\">\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:13px;color:#6b6b6b;margin-bottom:7px\">CVC<\u002Flabel>\n                  <input type=\"text\" inputmode=\"numeric\" value=\"{{cardCvc}}\" onchange=\"{{onCardCvc}}\" placeholder=\"123\" style=\"width:100%;padding:12px 13px;border:1px solid #dcdcdc;border-radius:11px;font-size:15px\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:13px;color:#6b6b6b;margin-bottom:7px\">Name on card<\u002Flabel>\n                <input type=\"text\" value=\"{{cardName}}\" onchange=\"{{onCardName}}\" placeholder=\"Juan dela Cruz\" style=\"width:100%;padding:12px 13px;border:1px solid #dcdcdc;border-radius:11px;font-size:15px\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;margin-top:14px;font-size:12.5px;color:#9a9a9a\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"11\" width=\"16\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M8 11V8a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg>\n              <span>Encrypted &amp; secure. Visa, Mastercard &amp; JCB accepted.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{errorMsg}}\" hint-placeholder-val=\"\">\n            <div style=\"margin-top:14px;font-size:13.5px;color:#b3261e\">{{errorMsg}}<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:20px;border-top:1px solid #eee\">\n            <button onclick=\"{{back}}\" style=\"background:none;border:none;color:#6b6b6b;font-size:15px;cursor:pointer;padding:0\">‹ Back<\u002Fbutton>\n            <button onclick=\"{{payNext}}\" style=\"padding:13px 28px;background:#5E1622;color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:500;cursor:pointer\">{{payButtonLabel}}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 3 : PROOF -->\n      <sc-if value=\"{{isStep3}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"padding:24px 32px 30px\">\n          <h3 style=\"margin:0 0 6px;font-size:26px;letter-spacing:-.02em;font-weight:600\">Proof of payment<\u002Fh3>\n          <p style=\"margin:0 0 22px;font-size:14.5px;color:#6b6b6b;line-height:1.55\">Upload your GCash receipt and reference number so we can confirm your booking.<\u002Fp>\n          <label style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:1.5px dashed #cfcfcf;border-radius:16px;padding:34px;cursor:pointer;text-align:center\">\n            <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5E1622\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 16V4M7 9l5-5 5 5M5 20h14\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:15px;font-weight:500;color:#1a1a1a\">{{proofLabel}}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:#9a9a9a\">PNG or JPG receipt screenshot<\u002Fspan>\n            <input type=\"file\" accept=\"image/*\" onchange=\"{{onProof}}\" style=\"display:none\">\n          <\u002Flabel>\n          <div style=\"margin-top:16px\">\n            <label style=\"display:block;font-size:13px;color:#6b6b6b;margin-bottom:7px\">GCash reference no.<\u002Flabel>\n            <input type=\"text\" value=\"{{refNo}}\" onchange=\"{{onRef}}\" placeholder=\"e.g. 0123 4567 8901\" style=\"width:100%;padding:12px 13px;border:1px solid #dcdcdc;border-radius:11px;font-size:15px\">\n          <\u002Fdiv>\n          <sc-if value=\"{{errorMsg}}\" hint-placeholder-val=\"\">\n            <div style=\"margin-top:14px;font-size:13.5px;color:#b3261e\">{{errorMsg}}<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:20px;border-top:1px solid #eee\">\n            <button onclick=\"{{back}}\" style=\"background:none;border:none;color:#6b6b6b;font-size:15px;cursor:pointer;padding:0\">‹ Back<\u002Fbutton>\n            <button onclick=\"{{submit}}\" style=\"padding:13px 28px;background:#5E1622;color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:500;cursor:pointer\">Submit booking<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DONE -->\n      <sc-if value=\"{{isDone}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"padding:44px 32px 40px;text-align:center\">\n          <div style=\"width:60px;height:60px;border-radius:50%;background:#5E1622;display:flex;align-items:center;justify-content:center;margin:0 auto 22px\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5 9-11\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"margin:0 0 10px;font-size:28px;letter-spacing:-.02em;font-weight:600\">{{doneTitle}}<\u002Fh3>\n          <p style=\"margin:0 auto 24px;max-width:340px;font-size:15px;line-height:1.6;color:#6b6b6b\">Thanks, {{firstName}}. {{doneMsg}}<\u002Fp>\n          <div style=\"text-align:left;max-width:320px;margin:0 auto;background:#FAFAF8;border:1px solid #eee;border-radius:14px;padding:18px 20px;font-size:14px;color:#3a3a3a;line-height:1.9\">\n            <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#9a9a9a\">Dates<\u002Fspan><span>{{datesLabel}}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#9a9a9a\">Guests<\u002Fspan><span>{{guests}}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#9a9a9a\">Total<\u002Fspan><span style=\"font-weight:600;color:#5E1622\">{{totalLabel}}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{closeModal}}\" style=\"margin-top:26px;padding:13px 30px;background:#1a1a1a;color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:500;cursor:pointer\">Done<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;parallaxIntensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.32,&quot;min&quot;:0,&quot;max&quot;:0.6,&quot;step&quot;:0.02,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;revealOnScroll&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;condenseNav&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.navRef = React.createRef();\n    this.heroImgRef = React.createRef();\n    this.state = {\n      modalOpen:false, step:1, submitted:false,\n      checkin:'', checkout:'', guests:1,\n      addons:{ towels:false, pool:'none', parking:false },\n      name:'', email:'', phone:'', refNo:'', proofName:'',\n      payMethod:'gcash',\n      card:{ no:'', name:'', exp:'', cvc:'' },\n      errorMsg:''\n    };\n    this.onScroll = this.onScroll.bind(this);\n  }\n\n  componentDidMount(){\n    window.addEventListener('scroll', this.onScroll, {passive:true});\n    this.onScroll();\n    const reveal = this.props.revealOnScroll !== false;\n    const els = Array.prototype.slice.call(document.querySelectorAll('.hof-reveal'));\n    if(!reveal || !('IntersectionObserver' in window)){\n      els.forEach(function(el){ el.style.opacity=1; el.style.transform='none'; });\n      return;\n    }\n    this.io = new IntersectionObserver((entries)=>{\n      entries.forEach((e)=>{\n        if(e.isIntersecting){ e.target.style.opacity=1; e.target.style.transform='none'; this.io.unobserve(e.target); }\n      });\n    }, {threshold:0.12, rootMargin:'0px 0px -8% 0px'});\n    els.forEach((el)=> this.io.observe(el));\n  }\n  componentWillUnmount(){\n    window.removeEventListener('scroll', this.onScroll);\n    if(this.io) this.io.disconnect();\n    document.body.style.overflow='';\n  }\n\n  onScroll(){\n    const y = window.pageYOffset || document.documentElement.scrollTop || 0;\n    const n = this.navRef.current;\n    if(n){\n      const solid = y > 60 && this.props.condenseNav !== false;\n      n.style.background = solid ? 'rgba(250,250,248,0.82)' : 'transparent';\n      n.style.backdropFilter = solid ? 'saturate(180%) blur(20px)' : 'none';\n      n.style.webkitBackdropFilter = n.style.backdropFilter;\n      n.style.boxShadow = solid ? '0 1px 0 rgba(0,0,0,.08)' : 'none';\n      n.style.paddingTop = solid ? '14px' : '22px';\n      n.style.paddingBottom = solid ? '14px' : '22px';\n    }\n    const h = this.heroImgRef.current;\n    if(h){\n      const k = (this.props.parallaxIntensity != null ? this.props.parallaxIntensity : 0.32);\n      h.style.transform = 'translateY(' + (y * k) + 'px)';\n    }\n  }\n\n  // ---- pricing ----\n  calc(){\n    const empty = {nights:0, room:0, discount:0, extraGuest:0, towels:0, pool:0, parking:0, total:0, valid:false};\n    const ci = this.state.checkin, co = this.state.checkout;\n    if(!ci || !co) return empty;\n    const a = new Date(ci+'T00:00'), b = new Date(co+'T00:00');\n    let nights = Math.round((b - a) / 86400000);\n    if(!(nights > 0)) return empty;\n    const guests = this.state.guests;\n    const ad = this.state.addons;\n    let room = 0;\n    for(let i=0;i<nights;i++){\n      const d = new Date(a); d.setDate(a.getDate()+i);\n      const day = d.getDay(); // 5=Fri,6=Sat\n      room += (day===5 || day===6) ? 2500 : 2200;\n    }\n    const discount   = nights > 1 ? 100 * nights : 0;          // multi-night: −₱100/night off total\n    const extraGuest = Math.max(0, guests - 2) * 200;          // +₱200 each, one-time\n    const towels     = ad.towels ? 50 : 0;\n    const pool       = ad.pool === 'holiday' ? 300 * guests : (ad.pool === 'regular' ? 150 * guests : 0);\n    const parking    = ad.parking ? 450 * nights : 0;\n    const total = room - discount + extraGuest + towels + pool + parking;\n    return {nights, room, discount, extraGuest, towels, pool, parking, total, valid:true, guests};\n  }\n  peso(n){ return '₱' + n.toLocaleString('en-PH'); }\n\n  // ---- handlers ----\n  openModal(){ this.setState({modalOpen:true, step:1, submitted:false, errorMsg:''}); document.body.style.overflow='hidden'; }\n  closeModal(){ this.setState({modalOpen:false}); document.body.style.overflow=''; }\n  stop(e){ e.stopPropagation(); }\n\n  set(k){ return (e)=> this.setState({[k]: e.target.value, errorMsg:''}); }\n  guestPlus(){ this.setState(s=>({guests: Math.min(4, s.guests+1)})); }\n  guestMinus(){ this.setState(s=>({guests: Math.max(1, s.guests-1)})); }\n  onProof(e){ const f = e.target.files && e.target.files[0]; this.setState({proofName: f ? f.name : '', errorMsg:''}); }\n  toggleAddon(key){ this.setState(s=>({addons:{...s.addons, [key]: !s.addons[key]}, errorMsg:''})); }\n  setPool(e){ const v = e.target.value; this.setState(s=>({addons:{...s.addons, pool:v}, errorMsg:''})); }\n  setMethod(m){ this.setState({payMethod:m, errorMsg:''}); }\n  setCard(k){ return (e)=> this.setState(s=>({card:{...s.card, [k]: e.target.value}, errorMsg:''})); }\n  payNext(){\n    if(this.state.payMethod === 'gcash'){ return this.setState({step:3, errorMsg:''}); }\n    // card\n    const {no, name, exp, cvc} = this.state.card;\n    if(no.replace(/\\D/g,'').length < 12){ return this.setState({errorMsg:'Please enter a valid card number.'}); }\n    if(!name.trim()){ return this.setState({errorMsg:'Please enter the name on the card.'}); }\n    if(!/^\\s*\\d{2}\\s*\\/\\s*\\d{2}\\s*$/.test(exp)){ return this.setState({errorMsg:'Please enter the expiry as MM/YY.'}); }\n    if(!/^\\d{3,4}$/.test(cvc.trim())){ return this.setState({errorMsg:'Please enter the 3–4 digit CVC.'}); }\n    this.setState({submitted:true, errorMsg:''});\n  }\n\n  next(){\n    if(this.state.step===1){\n      const {checkin, checkout, name, email, phone} = this.state;\n      const c = this.calc();\n      if(!checkin || !checkout){ return this.setState({errorMsg:'Please choose your check-in and check-out dates.'}); }\n      if(c.nights<=0){ return this.setState({errorMsg:'Check-out must be after check-in.'}); }\n      if(!name.trim()){ return this.setState({errorMsg:'Please enter your full name.'}); }\n      if(!/.+@.+\\..+/.test(email)){ return this.setState({errorMsg:'Please enter a valid email address.'}); }\n      if(phone.replace(/\\D/g,'').length < 7){ return this.setState({errorMsg:'Please enter a valid mobile number.'}); }\n      return this.setState({step:2, errorMsg:''});\n    }\n    if(this.state.step===2){ return this.setState({step:3, errorMsg:''}); }\n  }\n  back(){ this.setState(s=>({step: Math.max(1, s.step-1), errorMsg:''})); }\n  submit(){\n    if(!this.state.proofName){ return this.setState({errorMsg:'Please upload your payment receipt.'}); }\n    if(!this.state.refNo.trim()){ return this.setState({errorMsg:'Please enter your GCash reference number.'}); }\n    this.setState({submitted:true, errorMsg:''});\n  }\n\n  renderVals(){\n    const s = this.state;\n    const c = this.calc();\n    const done = s.submitted;\n    const stepNum = done ? 4 : s.step;\n    const fill = done ? 100 : (s.step/3)*100;\n    const stepNames = {1:'Details', 2:'Payment', 3:'Proof'};\n    const fmt = (d)=>{ if(!d) return '—'; const dt=new Date(d+'T00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };\n    const datesLabel = (s.checkin && s.checkout && c.nights>0) ? (fmt(s.checkin)+' – '+fmt(s.checkout)+' · '+c.nights+(c.nights>1?' nights':' night')) : '—';\n    const nightsWord = c.nights>1 ? ' nights' : ' night';\n    const poolDesc = s.addons.pool==='holiday' ? 'Pool access (holiday)' : 'Pool access';\n\n    return {\n      navRef: this.navRef,\n      heroImgRef: this.heroImgRef,\n      modalOpen: s.modalOpen,\n      openModal: ()=>this.openModal(),\n      closeModal: ()=>this.closeModal(),\n      stop: (e)=>this.stop(e),\n      isStep1: !done && s.step===1,\n      isStep2: !done && s.step===2,\n      isStep3: !done && s.step===3,\n      isDone: done,\n      stepTag: done ? 'Confirmed' : ('Step '+stepNum+' of 3 · '+stepNames[s.step]),\n      fillWidth: fill + '%',\n      checkin: s.checkin, checkout: s.checkout, guests: s.guests,\n      name: s.name, email: s.email, phone: s.phone, refNo: s.refNo,\n      firstName: (s.name.trim().split(/\\s+/)[0]) || 'traveler',\n      onCheckin: this.set('checkin'),\n      onCheckout: this.set('checkout'),\n      onName: this.set('name'),\n      onEmail: this.set('email'),\n      onPhone: this.set('phone'),\n      onRef: this.set('refNo'),\n      onProof: (e)=>this.onProof(e),\n      // payment method\n      isGcash: s.payMethod==='gcash',\n      isCard: s.payMethod==='card',\n      setGcash: ()=>this.setMethod('gcash'),\n      setCardMethod: ()=>this.setMethod('card'),\n      payNext: ()=>this.payNext(),\n      payButtonLabel: s.payMethod==='card' ? ('Pay '+(c.valid?this.peso(c.total):'')) : \"I've sent it\",\n      gcashTabStyle: 'flex:1;padding:12px;border-radius:12px;font-size:14px;cursor:pointer;transition:all .2s;' + (s.payMethod==='gcash' ? 'border:1.5px solid #5E1622;background:#fbf3f4;font-weight:600;color:#5E1622' : 'border:1px solid #dcdcdc;background:#fff;font-weight:500;color:#6b6b6b'),\n      cardTabStyle: 'flex:1;padding:12px;border-radius:12px;font-size:14px;cursor:pointer;transition:all .2s;' + (s.payMethod==='card' ? 'border:1.5px solid #5E1622;background:#fbf3f4;font-weight:600;color:#5E1622' : 'border:1px solid #dcdcdc;background:#fff;font-weight:500;color:#6b6b6b'),\n      cardNo: s.card.no, cardName: s.card.name, cardExp: s.card.exp, cardCvc: s.card.cvc,\n      onCardNo: this.setCard('no'), onCardName: this.setCard('name'), onCardExp: this.setCard('exp'), onCardCvc: this.setCard('cvc'),\n      doneTitle: s.payMethod==='card' ? 'Booking confirmed' : 'Booking requested',\n      doneMsg: s.payMethod==='card'\n        ? \"Your card payment went through and your reservation is confirmed. A receipt is on its way to your email.\"\n        : \"We'll confirm your reservation over Messenger or email within a few hours of checking your proof of payment.\",\n      guestPlus: ()=>this.guestPlus(),\n      guestMinus: ()=>this.guestMinus(),\n      next: ()=>this.next(),\n      back: ()=>this.back(),\n      submit: ()=>this.submit(),\n      errorMsg: s.errorMsg,\n      totalLabel: c.valid ? this.peso(c.total) : '—',\n      datesLabel: datesLabel,\n      proofLabel: s.proofName || 'Tap to upload receipt',\n      // add-on controls\n      towelsOn: s.addons.towels,\n      parkingOn: s.addons.parking,\n      poolMode: s.addons.pool,\n      toggleTowels: ()=>this.toggleAddon('towels'),\n      toggleParking: ()=>this.toggleAddon('parking'),\n      onPool: (e)=>this.setPool(e),\n      parkingHint: c.valid && c.nights>0 ? ('₱450 × '+c.nights+nightsWord) : '₱450 / night',\n      // price breakdown\n      priceValid: c.valid,\n      priceInvalid: !c.valid,\n      roomRowLabel: c.valid ? ('Room · '+c.nights+nightsWord) : 'Room',\n      roomLabel: this.peso(c.room),\n      showDiscount: c.discount>0,\n      discountLabel: '−'+this.peso(c.discount),\n      showExtra: c.extraGuest>0,\n      extraRowLabel: 'Extra guests · '+Math.max(0,s.guests-2),\n      extraLabel: '+'+this.peso(c.extraGuest),\n      showTowels: c.towels>0,\n      towelsLabel: '+'+this.peso(c.towels),\n      showPool: c.pool>0,\n      poolRowLabel: poolDesc+' · '+s.guests,\n      poolLabel: '+'+this.peso(c.pool),\n      showParking: c.parking>0,\n      parkingRowLabel: 'Parking · '+c.nights+nightsWord,\n      parkingLabel: '+'+this.peso(c.parking),\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\
