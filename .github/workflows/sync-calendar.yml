name: Sync booking calendar

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch: {}     # allows manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and merge iCal feeds
        env:
          AIRBNB_ICAL_URL: ${{ secrets.AIRBNB_ICAL_URL }}
          BOOKINGCOM_ICAL_URL: ${{ secrets.BOOKINGCOM_ICAL_URL }}
          AGODA_ICAL_URL: ${{ secrets.AGODA_ICAL_URL }}
          GOOGLE_CALENDAR_ICAL_URL: ${{ secrets.GOOGLE_CALENDAR_ICAL_URL }}
        run: node .github/scripts/sync-calendar.js

      - name: Commit updated calendar if changed
        run: |
          git config user.name "calendar-sync-bot"
          git config user.email "actions@github.com"
          git add data/synced-blocks.json
          git diff --staged --quiet && exit 0

          # synced-blocks.json is fully regenerated each run (not a patch), so if the
          # push gets rejected because the remote moved on (a manual push, or another
          # run), there's nothing to merge line-by-line — our freshly-computed content
          # is already correct and should just win. Reset onto the new tip and
          # re-commit it there instead of attempting a rebase/merge.
          for i in 1 2 3 4 5; do
            git commit -m "Sync booking calendar"
            if git push; then
              exit 0
            fi
            echo "Push rejected, retrying (attempt $i)…"
            git fetch origin main
            git reset --soft origin/main
            git add data/synced-blocks.json
          done
          echo "Failed to push after retries."
          exit 1
